# Honcho on Railway: https://docs.railway.app/reference/config-as-code
#
# Setup (dashboard):
# 1. New project → Deploy from this repo → pick this Dockerfile (builder: Dockerfile).
#    Dockerfile uses only cache mounts (no bind mounts); Railway rejects type=bind.
# 2. Add PostgreSQL (enable pgvector in the DB: CREATE EXTENSION IF NOT EXISTS vector;).
# 3. Set LLM_* API keys and any other vars from .env.template.
#    Railway sets DATABASE_URL; this app maps it to DB_CONNECTION_URI automatically.
# 4. Optional: Redis + CACHE_ENABLED=true + CACHE_URL (or map REDIS_URL in dashboard).
# 5. Optional second service (same image): start command
#    /app/.venv/bin/python -m src.deriver — same env as the API.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
preDeployCommand = "/app/.venv/bin/python scripts/provision_db.py"
startCommand = "sh -c 'exec /app/.venv/bin/fastapi run --host 0.0.0.0 --port ${PORT:-8000} src/main.py'"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
